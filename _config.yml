title: www.ibraheem.com

version: 1.1.0

url: http://ibraheem.com
slug: Ibraheem
subtitle: Mostly posts about code.
description: This is my personal blog, since 2007.

markdown: kramdown
highlighter: rouge

# Conversion
incremental: true

# Setup
sass:
  sass_dir: ./assets/scss
  style: compressed

baseurl: /
timezone: America/Los_Angeles
permalink: :categories/:title/

# Gems
gems:
  - jemoji
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-gist

paginate: 3

# Author
author:
  name: Ibraheem Abdul-Malik
  url: https://twitter.com/ibraheem4
  bio: Houston Texas 1986
  avatar: ibraheem.jpg
  email: ibraheem4@gmail.com

# Owner
owner:
  name: Ibraheem Abdul-Malik

# Project
github:
  username: ibraheem4
  repo: https://github.com/ibraheem4/ibraheem4.github.io

# Social
