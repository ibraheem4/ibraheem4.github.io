<div class="ui stackable secondary pointing menu">
  {% for item in site.navigation %}
    {% assign class = nil %}
    {% if page.url contains item.url %}
        {% assign class = 'active' %}
    {% endif %}
    <li class="item">
      <a href="{{ item.url }}" class="{{ class }}">
        {{ item.title }}
      </a>
    </li>
  {% endfor %}
</div>
