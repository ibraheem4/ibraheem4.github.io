{% if paginator.total_pages > 1 %}
<ul class="pagination text-center">
  {% if paginator.previous_page %}
  <li><a href="{{ paginator.previous_page_path }}">Newer</a></li>
  {% else %}
  <li><a class="disabled">Newer</a></li>
  {% endif %}
  {% if paginator.next_page %}
  <li><a href="{{ paginator.next_page_path }}">Older</a></li>
  {% else %}
  <li><a class="disabled">Older</a></li>
  {% endif %}
</ul>
{% endif %}
