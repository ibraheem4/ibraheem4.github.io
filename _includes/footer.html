<div class="ui vertical footer segment">
  <div class="ui center aligned container">
    <div class="ui horizontal massive link list">
    {% if site.twitter.username %}<a class="item" href="http://twitter.com/{{ site.twitter.username }}"><i class="twitter icon"></i></a>{% endif %}
    {% if site.google.plus.custom_id %}<a class="item" href="http://google.com/+{{ site.google.plus.custom_id }}"><i class="google plus icon"></i></a>{% endif %}
    {% if site.github.username %}<a class="item" href="http://github.com/{{ site.github.username }}"><i class="github alternate icon"></i></a>{% endif %}
    {% if site.instagram.username %}<a class="item" href="http://instagram.com/{{ site.instagram.username }}"><i class="instagram icon"></i></a>{% endif %}
    {% if site.facebook.username %}<a class="item" href="http://facebook.com/{{ site.facebook.username }}"><i class="facebook icon"></i></a>{% endif %}
    </div>
  </div>
</div>
