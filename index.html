---
layout: default
title: Home
---
<div class="row small-12 medium-9 large-8 columns">
  <div class="blog-post">
    {% for post in paginator.posts %}
      <h6>
        <a href="{{ post.url }}">
          {{ post.title }}
        </a>
        <a class="subheader float-right">
          {{ post.date | date: '%B %d, %Y' }}
        </a>
      </h6>
    <hr/>
    {% endfor %}
  </div>
  {% include paginate_oldernewer.html %}
</div>
