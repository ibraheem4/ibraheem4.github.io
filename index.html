---
layout: default
title: Home
---
<div class="top-bar">
  <div>
    <div class="top-bar-left">
      <ul class="menu">
        <li class="menu-text">{{ site.slug }}</li>
      </ul>
    </div>
    <div class="top-bar-right">
      <ul class="menu">
        <li><a href="{{ site.baseurl }}about/">About</a></li>
        <li><a href="{{ site.baseurl }}projects/">Work</a></li>
      </ul>
    </div>
  </div>
</div>

<div class="callout large primary">
  <div class="row column text-center">
    <h1>{{ site.subtitle }}</h1>
    <h2 class="subheader">Latest Blog Articles</h2>
  </div>
</div>

<div class="row medium-8 large-7 columns">
  <div class="blog-post">
    {% for post in paginator.posts %}
      <h3>
        <a href="{{ post.url }}">
          {{ post.title }}
        </a>
        <small>
          {{ post.date | date: '%B %d, %Y' }}
        </small>
      </h3>
    <hr/>
    {% endfor %}
  </div>

  {% include paginate_oldernewer.html %}

</div>
